name: CI
run-name: >-
  CI / ${{ github.event_name == 'pull_request' && format('PR #{0} @ {1}', github.event.pull_request.number, github.event.pull_request.head.sha) || format('push @ {0}', github.sha) }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code_changed: ${{ steps.diff.outputs.code_changed }}
      desktop_changed: ${{ steps.diff.outputs.desktop_changed }}
      docs_only: ${{ steps.diff.outputs.docs_only }}
      ipc_changed: ${{ steps.diff.outputs.ipc_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
            if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
              BASE="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi
          HEAD="${{ github.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"

          if printf '%s\n' "$FILES" | grep -Eq '^(apps/|packages/|scripts/|package.json|pnpm-lock.yaml|.github/actions/|.github/workflows/)'; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$FILES" | grep -Eq '^(apps/desktop/|packages/|package.json|pnpm-lock.yaml)'; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$FILES" | grep -Eq '^(packages/shared/|apps/desktop/main/src/ipc/|apps/desktop/preload/)'; then
            echo "ipc_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ipc_changed=false" >> "$GITHUB_OUTPUT"
          fi

  lint-and-typecheck:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Lint
        run: pnpm lint
      - name: Lint warning budget
        run: pnpm lint:warning-budget
      - name: ESLint rule tests
        run: pnpm test:eslint-rules
      - name: Type check
        run: pnpm typecheck


  unit-test-core:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Unit tests
        run: pnpm test:unit

  unit-test-renderer:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Desktop vitest (renderer/store)
        run: pnpm -C apps/desktop test:run

  integration-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Integration tests
        run: pnpm test:integration

  test-discovery-consistency:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Test discovery consistency
        run: pnpm test:discovery:consistency

  coverage-gate:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Frontend coverage
        run: pnpm test:coverage:desktop
      - name: Backend coverage
        run: pnpm test:coverage:core
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-coverage
          path: apps/desktop/coverage/

  ipc-acceptance:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ipc_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: IPC acceptance SLO gate
        run: pnpm test:ipc:acceptance

  contract-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ipc_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: IPC contract check
        run: pnpm contract:check

  cross-module-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ipc_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Cross-module contract alignment check
        run: pnpm cross-module:check

  storybook-build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Storybook build check
        run: pnpm -C apps/desktop storybook:build

  # ── Wave 0 Gate Jobs ──────────────────────────────────────────────

  gate-resource-size:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Resource size gate
        run: pnpm gate:resource-size

  gate-ipc-validation:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: IPC handler validation gate
        run: pnpm gate:ipc-validation

  gate-service-stubs:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Service stub detector gate
        run: pnpm gate:service-stubs

  gate-error-boundary:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Error boundary coverage gate
        run: pnpm gate:error-boundary

  gate-architecture-health:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Architecture health gate
        run: pnpm gate:architecture-health

  gate-spec-test-mapping:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Spec-test mapping gate
        run: pnpm gate:spec-test-mapping

  gate-bundle-budget:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.desktop_changed == 'true'
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Build desktop artifacts
        run: pnpm -C apps/desktop build
      - name: Bundle size budget gate
        run: pnpm gate:bundle-budget

  windows-e2e:
    runs-on: windows-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.desktop_changed == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -C apps/desktop exec playwright install

      - name: Playwright Electron E2E (Windows)
        run: pnpm -C apps/desktop test:e2e

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-windows
          path: |
            apps/desktop/tests/e2e/playwright-report/
            apps/desktop/tests/e2e/test-results/

  windows-build:
    runs-on: windows-latest
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.desktop_changed == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Electron builder
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows artifacts (NSIS + zip)
        run: pnpm -C apps/desktop build:win

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creonow-windows-build
          path: apps/desktop/dist-electron/

  ci:
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - changes
      - lint-and-typecheck
      - unit-test-core
      - unit-test-renderer
      - integration-test
      - test-discovery-consistency
      - coverage-gate
      - ipc-acceptance
      - contract-check
      - cross-module-check
      - storybook-build
      - gate-resource-size
      - gate-ipc-validation
      - gate-service-stubs
      - gate-error-boundary
      - gate-architecture-health
      - gate-spec-test-mapping
      - gate-bundle-budget
      - windows-e2e
    timeout-minutes: 2
    steps:
      - name: CI gate
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          non_success = {
            name: meta.get("result", "unknown")
            for name, meta in needs.items()
            if meta.get("result") not in {"success", "skipped"}
          }

          if non_success:
            print("❌ ci gate blocked: prerequisite jobs not in success/skipped state:")
            for name, result in sorted(non_success.items()):
              print(f"  - {name}: {result}")
            sys.exit(1)

          print("✅ All required CI jobs passed (or were intentionally skipped).")
          PY
