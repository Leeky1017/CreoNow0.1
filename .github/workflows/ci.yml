name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Fast feedback (parallel) ─────────────────────────────────

  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Lint
        run: pnpm lint
      - name: Lint ratchet
        run: pnpm lint:ratchet
      - name: Type check
        run: pnpm typecheck

  doc-timestamp-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Doc timestamp gate
        run: |
          python3 scripts/check_doc_timestamps.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}"

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Unit tests
        run: pnpm test:unit
      - name: Desktop vitest (renderer/store)
        run: pnpm -C apps/desktop test:run

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Integration tests
        run: pnpm test:integration

  test-discovery-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Test discovery consistency
        run: pnpm test:discovery:consistency

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Coverage gate
        run: pnpm test:coverage:desktop
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-coverage
          path: apps/desktop/coverage/

  ipc-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: IPC acceptance SLO gate
        run: pnpm test:ipc:acceptance

  contract-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: IPC contract check
        run: pnpm contract:check

  cross-module-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Cross-module contract alignment check
        run: pnpm cross-module:check

  storybook-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Storybook build check
        run: pnpm -C apps/desktop storybook:build

  # ── Windows jobs ─────────────────────────────────────────────

  windows-e2e:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -C apps/desktop exec playwright install

      - name: Playwright Electron E2E (Windows)
        run: pnpm -C apps/desktop test:e2e

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-windows
          path: |
            apps/desktop/tests/e2e/playwright-report/
            apps/desktop/tests/e2e/test-results/

  windows-build:
    runs-on: windows-latest
    if: github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows artifacts (NSIS + zip)
        run: pnpm -C apps/desktop build:win

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creonow-windows-build
          path: |
            apps/desktop/dist-electron/

  ci:
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - doc-timestamp-gate
      - lint-and-typecheck
      - unit-test
      - integration-test
      - test-discovery-consistency
      - coverage-gate
      - ipc-acceptance
      - contract-check
      - cross-module-check
      - storybook-build
      - windows-e2e
    timeout-minutes: 2
    steps:
      - name: CI gate
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          non_success = {
            name: meta.get("result", "unknown")
            for name, meta in needs.items()
            if meta.get("result") != "success"
          }

          if non_success:
            print("❌ ci gate blocked: prerequisite jobs not in success state:")
            for name, result in sorted(non_success.items()):
              print(f"  - {name}: {result}")
            sys.exit(1)

          print("✅ All required CI jobs passed.")
          PY
