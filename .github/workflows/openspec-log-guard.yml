name: OpenSpec Log Guard
run-name: >-
  OpenSpec Log Guard / PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}

on:
  pull_request:
    branches: [main]

concurrency:
  group: openspec-log-guard-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  openspec-log-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate completed active changes are archived (tasks.md all checked)
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("openspec/changes")
          active = sorted(
            d for d in root.iterdir()
            if d.is_dir() and not d.name.startswith(".") and d.name not in {"archive", "_template"}
          )

          completed_active = []
          for change_dir in active:
            tasks_path = change_dir / "tasks.md"
            if not tasks_path.is_file():
              continue

            content = tasks_path.read_text(encoding="utf-8")
            marks = re.findall(r"^- \[([ xX])\]", content, flags=re.MULTILINE)
            if marks and all(mark.lower() == "x" for mark in marks):
              completed_active.append(change_dir.name)

          if completed_active:
            print(
              "❌ tasks.md checkboxes are all checked, so completed changes must be archived to "
              "openspec/changes/archive/: "
              + ", ".join(completed_active)
            )
            sys.exit(1)

          print("✅ Completed active change archive guard passed")
          PY

      - name: Validate RUN_LOG or Skip-Reason
        id: validate_run_log_or_skip_reason
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "skip_reason_missing=false" >> "$GITHUB_OUTPUT"

          if [[ "$BRANCH" =~ ^task/([0-9]+)- ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
            RUN_LOG="openspec/_ops/task_runs/ISSUE-${ISSUE_NUM}.md"

            if [ ! -f "$RUN_LOG" ]; then
              echo "❌ RUN_LOG not found: $RUN_LOG"
              exit 1
            fi
            echo "✅ RUN_LOG found: $RUN_LOG"

            MISSING=""
            grep -q "^- Issue:" "$RUN_LOG" || MISSING="${MISSING} Issue"
            grep -q "^- Branch:" "$RUN_LOG" || MISSING="${MISSING} Branch"
            grep -q "^- PR:" "$RUN_LOG" || MISSING="${MISSING} PR"
            grep -q "^## Plan" "$RUN_LOG" || MISSING="${MISSING} Plan"
            grep -q "^## Runs" "$RUN_LOG" || MISSING="${MISSING} Runs"

            if [ -n "$MISSING" ]; then
              echo "❌ RUN_LOG missing required fields:${MISSING}"
              exit 1
            fi
            echo "✅ RUN_LOG format validated"

            python3 scripts/validate_main_session_audit_ci.py "$RUN_LOG"
          else
            if printf '%s\n' "$PR_BODY" | grep -Eiq '^[[:space:]]*Skip-Reason[[:space:]]*:'; then
              echo "✅ Non-task branch with required Skip-Reason"
            else
              FIX_LINE="Skip-Reason: automated quality iteration by 天野 (non-task branch)"
              echo "skip_reason_missing=true" >> "$GITHUB_OUTPUT"

              echo "❌ Missing Skip-Reason in PR body"
              echo "Fix suggestion (copy one line): $FIX_LINE"
              echo "After updating the PR body, re-run OpenSpec Log Guard from Checks tab."
              echo "Minimal example:"
              echo "$FIX_LINE"
              echo "## 主题"
              echo "- 简要说明本次改动解决的问题"

              {
                echo "### Missing Skip-Reason"
                echo
                echo "Non-task branch \`$BRANCH\` must include a \`Skip-Reason:\` line in PR body."
                echo
                echo "Copy one line:"
                echo "\`$FIX_LINE\`"
                echo
                echo "更新 PR 描述后，请在 Checks 页面点击 \`Re-run jobs\`（或 push 任意新 commit）重新触发 OpenSpec Log Guard。"
                echo
                echo "Minimal example:"
                echo '```markdown'
                echo "$FIX_LINE"
                echo "## 主题"
                echo "- 简要说明本次改动解决的问题"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Comment Skip-Reason guidance on PR
        if: ${{ steps.validate_run_log_or_skip_reason.outputs.skip_reason_missing == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- openspec-skip-reason-guidance -->';
            const fixLine = 'Skip-Reason: automated quality iteration by 天野 (non-task branch)';
            const body = [
              marker,
              'OpenSpec Log Guard 检测到当前分支不是 `task/*`，但 PR 描述缺少 `Skip-Reason:`。',
              '',
              '可直接复制这一行到 PR 描述顶部：',
              `\`${fixLine}\``,
              '',
              '更新 PR 描述后，请在 Checks 页面点击 `Re-run jobs`（或 push 任意新 commit）重新触发 OpenSpec Log Guard。',
              '',
              '最小示例：',
              '```markdown',
              fixLine,
              '## 主题',
              '- 简要说明本次改动解决的问题',
              '```',
            ].join('\n');

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail when Skip-Reason is missing
        if: ${{ steps.validate_run_log_or_skip_reason.outputs.skip_reason_missing == 'true' }}
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "::error title=Missing Skip-Reason::Non-task branch '$BRANCH' must include a 'Skip-Reason:' line in PR body."
          echo "❌ Missing Skip-Reason in PR body"
          echo "请按机器人评论指引补齐 Skip-Reason 后重跑 OpenSpec Log Guard。"
          exit 1
